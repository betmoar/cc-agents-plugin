name: release

# Cutting a release (see CLAUDE.md): merge to main with plugin.json AND
# package.json version bumped together and the matching `## [x.y.z]` entry
# newest in CHANGELOG.md, then push a tag `v<x.y.z>`. This workflow fails the
# tag build on any mismatch, re-runs the full gate (tests + shellcheck), and
# publishes a GitHub release whose body is that version's CHANGELOG section.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gate — tag == plugin.json == package.json == newest CHANGELOG heading
        run: node scripts/release-gate.mjs "$GITHUB_REF_NAME" --notes-out release-notes.md

      - name: Unit + drift-lock tests
        run: node --test

      - name: Shell lint
        run: |
          command -v shellcheck >/dev/null || { sudo apt-get update && sudo apt-get install -y shellcheck; }
          shellcheck hooks/*.sh scripts/*.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
